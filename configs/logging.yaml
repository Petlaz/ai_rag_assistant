version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s:%(lineno)d - %(funcName)s(): %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  json:
    format: "%(asctime)s"
    class: "pythonjsonlogger.jsonlogger.JsonFormatter"

handlers:
  console:
    class: "logging.StreamHandler"
    level: "INFO"
    formatter: "standard"
    stream: "ext://sys.stdout"
  
  file:
    class: "logging.handlers.RotatingFileHandler"
    level: "DEBUG"
    formatter: "detailed"
    filename: "logs/app.log"
    maxBytes: 10485760  # 10MB
    backupCount: 5
  
  error_file:
    class: "logging.handlers.RotatingFileHandler"
    level: "ERROR"
    formatter: "detailed"
    filename: "logs/error.log"
    maxBytes: 10485760  # 10MB
    backupCount: 5

loggers:
  rag_pipeline:
    level: "DEBUG"
    handlers: ["console", "file"]
    propagate: false
  
  llm_ollama:
    level: "DEBUG"
    handlers: ["console", "file"]
    propagate: false
  
  deployment:
    level: "INFO"
    handlers: ["console", "file"]
    propagate: false
  
  gradio:
    level: "INFO"
    handlers: ["console"]
    propagate: false
  
  opensearch:
    level: "WARNING"
    handlers: ["console"]
    propagate: false

root:
  level: "INFO"
  handlers: ["console", "file"]