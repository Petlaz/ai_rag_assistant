# Production Monitoring Configuration
# =====================================
# 
# Comprehensive monitoring configuration for Quest Analytics RAG Assistant
# production deployment with AWS CloudWatch integration and cost-optimized
# monitoring strategy for ultra-budget deployment mode.

# General Monitoring Settings
monitoring:
  enabled: true
  environment: "production"
  service_name: "quest-analytics-rag"
  namespace: "RAGAssistant"
  
  # Monitoring intervals and retention
  collection_interval_seconds: 60
  metric_retention_days: 30
  log_retention_days: 14
  
  # Cost optimization settings
  budget_mode: "ultra_budget"
  max_monthly_cost_usd: 5.00

# AWS CloudWatch Configuration
cloudwatch:
  enabled: true
  region: "us-east-1"
  
  # Custom metrics configuration
  custom_metrics:
    namespace: "RAGAssistant/Performance"
    enabled: true
    batch_size: 20
    flush_interval_seconds: 300
    
  # Log groups configuration  
  log_groups:
    application_logs:
      name: "/aws/lambda/rag-assistant-app"
      retention_days: 14
      
    error_logs:
      name: "/aws/lambda/rag-assistant-errors" 
      retention_days: 30
      
    performance_logs:
      name: "/aws/lambda/rag-assistant-performance"
      retention_days: 7

# Performance Monitoring
performance:
  # Query response time monitoring
  response_time:
    enabled: true
    p50_threshold_ms: 1000
    p95_threshold_ms: 2000
    p99_threshold_ms: 3000
    
  # Retrieval performance monitoring
  retrieval:
    enabled: true
    precision_at_5_threshold: 0.70
    mrr_threshold: 0.75
    recall_at_10_threshold: 0.80
    
  # Memory and resource monitoring
  resources:
    enabled: true
    memory_usage_threshold_mb: 900  # For 1024MB Lambda
    cpu_utilization_threshold: 80
    
  # Cost per query monitoring
  cost_tracking:
    enabled: true
    cost_per_query_threshold_usd: 0.002
    daily_budget_threshold_usd: 0.60

# Application-Specific Metrics
application_metrics:
  # RAG system performance
  rag_performance:
    - name: "QueryResponseTime"
      description: "End-to-end query response time"
      unit: "Milliseconds"
      dimensions:
        - name: "Service"
          value: "RAGAssistant"
          
    - name: "RetrievalTime" 
      description: "Document retrieval time"
      unit: "Milliseconds"
      dimensions:
        - name: "Component"
          value: "Retrieval"
          
    - name: "GenerationTime"
      description: "Response generation time"
      unit: "Milliseconds" 
      dimensions:
        - name: "Component"
          value: "Generation"
          
    - name: "PrecisionAtFive"
      description: "Precision@5 metric for retrieval quality"
      unit: "None"
      dimensions:
        - name: "Model"
          value: "Current"
          
    - name: "MRR"
      description: "Mean Reciprocal Rank"
      unit: "None"
      dimensions:
        - name: "Model" 
          value: "Current"
          
  # Cost tracking metrics
  cost_metrics:
    - name: "BedrockCostPerQuery"
      description: "AWS Bedrock cost per query"
      unit: "None"
      dimensions:
        - name: "Service"
          value: "Bedrock"
          
    - name: "LambdaCostPerQuery"
      description: "Lambda execution cost per query"
      unit: "None"
      dimensions:
        - name: "Service"
          value: "Lambda"
          
    - name: "TotalCostPerQuery"
      description: "Total AWS cost per query"
      unit: "None"
      dimensions:
        - name: "Service"
          value: "Total"
          
  # Error tracking metrics
  error_metrics:
    - name: "ErrorRate"
      description: "Query error rate percentage"
      unit: "Percent"
      dimensions:
        - name: "ErrorType"
          value: "All"
          
    - name: "TimeoutRate"
      description: "Query timeout rate percentage" 
      unit: "Percent"
      dimensions:
        - name: "Service"
          value: "RAGAssistant"

# Health Check Configuration
health_checks:
  enabled: true
  interval_seconds: 300
  timeout_seconds: 30
  
  endpoints:
    - name: "lambda_health"
      url: "AWS_LAMBDA_FUNCTION_URL/health"
      method: "GET"
      expected_status: 200
      timeout_seconds: 10
      
    - name: "opensearch_health"
      type: "opensearch_cluster"
      timeout_seconds: 15
      
    - name: "bedrock_health"
      type: "bedrock_service"
      timeout_seconds: 20

# Dashboard Configuration
dashboards:
  enabled: true
  auto_create: true
  
  # Main performance dashboard
  performance_dashboard:
    name: "RAG-Assistant-Performance"
    widgets:
      - type: "line_chart"
        title: "Query Response Times"
        metrics:
          - "RAGAssistant/Performance/QueryResponseTime"
        period: 300
        stat: "Average"
        
      - type: "line_chart" 
        title: "Retrieval Quality Metrics"
        metrics:
          - "RAGAssistant/Performance/PrecisionAtFive"
          - "RAGAssistant/Performance/MRR"
        period: 300
        stat: "Average"
        
      - type: "line_chart"
        title: "Cost per Query"
        metrics:
          - "RAGAssistant/Costs/TotalCostPerQuery"
        period: 300
        stat: "Average"
        
      - type: "number"
        title: "Error Rate"
        metrics:
          - "RAGAssistant/Errors/ErrorRate"
        period: 300
        stat: "Average"
        
  # Cost monitoring dashboard
  cost_dashboard:
    name: "RAG-Assistant-Costs"
    widgets:
      - type: "line_chart"
        title: "Daily Costs by Service"
        metrics:
          - "RAGAssistant/Costs/BedrockCostPerQuery"
          - "RAGAssistant/Costs/LambdaCostPerQuery"
        period: 3600
        stat: "Sum"
        
      - type: "number"
        title: "Monthly Cost Estimate"
        metrics:
          - "AWS/Billing/EstimatedCharges"
        period: 86400
        stat: "Maximum"

# Integration Settings
integrations:
  # MLflow integration for model monitoring
  mlflow:
    enabled: true
    tracking_uri: "./mlruns"
    experiment_name: "production_monitoring"
    log_frequency_minutes: 60
    
  # Slack notifications (optional)
  slack:
    enabled: false
    webhook_url: ""  # Set in environment variable
    channel: "#rag-alerts"
    
  # Email notifications
  email:
    enabled: true
    sns_topic_arn: ""  # Set during deployment
    
# Sampling and Rate Limiting
sampling:
  # Sample percentage of requests for detailed monitoring
  enabled: true
  percentage: 10  # Monitor 10% of requests in detail
  
  # Rate limiting for cost control
  rate_limits:
    metrics_per_minute: 100
    logs_per_minute: 200
    custom_events_per_minute: 50

# Security and Privacy
security:
  # Data privacy settings
  mask_user_queries: true
  log_personal_data: false
  
  # Monitoring data encryption
  encrypt_logs: true
  encrypt_metrics: false  # CloudWatch standard encryption
  
# Backup and Recovery
backup:
  enabled: true
  monitoring_data_backup: true
  backup_retention_days: 90
  s3_backup_bucket: ""  # Set during deployment