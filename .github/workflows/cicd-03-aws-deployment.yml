name: Deploy to AWS

permissions:
  contents: read
  issues: write
  packages: read

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      deployment_mode:
        description: 'Deployment mode'
        required: true
        default: 'balanced'
        type: choice
        options:
          - ultra-budget
          - balanced
          - full-scale
      force_deploy:
        description: 'Force deployment (skip validation)'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: 'us-east-1'
  CONTAINER_REGISTRY: 'ghcr.io'
  IMAGE_TAG: ${{ github.sha }}
  DEPLOYMENT_TIMEOUT: '900' # 15 minutes (reduced from 30)

jobs:
  validate-deployment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deployment-mode: ${{ steps.set-mode.outputs.mode }}
      can-deploy: ${{ steps.validation.outputs.can-deploy }}
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set environment
      id: set-env
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "environment=production" >> $GITHUB_OUTPUT
        else
          echo "environment=staging" >> $GITHUB_OUTPUT
        fi
    
    - name: Set deployment mode
      id: set-mode
      run: |
        if [ "${{ github.event.inputs.deployment_mode }}" != "" ]; then
          echo "mode=${{ github.event.inputs.deployment_mode }}" >> $GITHUB_OUTPUT
        elif [ "${{ steps.set-env.outputs.environment }}" = "production" ]; then
          echo "mode=balanced" >> $GITHUB_OUTPUT
        else
          echo "mode=ultra-budget" >> $GITHUB_OUTPUT
        fi
    
    - name: Validate deployment readiness
      id: validation
      run: |
        can_deploy="true"
        
        # Check if this is a force deployment
        if [ "${{ github.event.inputs.force_deploy }}" = "true" ]; then
          echo "WARNING: Force deployment enabled - skipping validation checks"
          echo "can-deploy=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # Validate required deployment files
        required_files=(
          "deployment/aws/docker/docker-compose.dev.yml"
          "deployment/aws/docker/Dockerfile.app"
          "deployment/aws/docker/Dockerfile.landing"
          "deployment/aws/docker/Dockerfile.worker"
          "scripts/deployment/blue_green_deploy.py"
          "scripts/deployment/production_validation.py"
          "scripts/deployment/rollback_system.py"
        )
        
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "ERROR: Missing required file: $file"
            can_deploy="false"
          fi
        done
        
        # Check for production deployment requirements
        if [ "${{ steps.set-env.outputs.environment }}" = "production" ]; then
          if [ ! -f "scripts/deployment/estimate_aws_costs.py" ]; then
            echo "ERROR: Cost estimation script required for production deployment"
            can_deploy="false"
          fi
          
          if [ "${{ github.ref }}" != "refs/heads/main" ] && [[ "${{ github.ref }}" != refs/tags/v* ]]; then
            echo "ERROR: Production deployments only allowed from main branch or version tags"
            can_deploy="false"
          fi
        fi
        
        echo "can-deploy=$can_deploy" >> $GITHUB_OUTPUT
        
        if [ "$can_deploy" = "false" ]; then
          echo "ERROR: Deployment validation failed"
          exit 1
        else
          echo "SUCCESS: Deployment validation passed"
        fi

  cost-estimation:
    runs-on: ubuntu-latest
    needs: validate-deployment
    if: needs.validate-deployment.outputs.can-deploy == 'true' && false  # Skip cost estimation for speed
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3 click tabulate PyYAML
    
    - name: Estimate deployment costs
      run: |
        python scripts/deployment/estimate_aws_costs.py \
          --deployment-mode ${{ needs.validate-deployment.outputs.deployment-mode }} \
          --output table
    
    - name: Generate cost report
      id: cost-report
      run: |
        cost_output=$(python scripts/deployment/estimate_aws_costs.py \
          --deployment-mode ${{ needs.validate-deployment.outputs.deployment-mode }} \
          --output json)
        
        echo "cost-report<<EOF" >> $GITHUB_OUTPUT
        echo "$cost_output" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    outputs:
      cost-report: ${{ steps.cost-report.outputs.cost-report }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate-deployment  # Remove cost-estimation dependency
    if: needs.validate-deployment.outputs.can-deploy == 'true'
    
    strategy:
      matrix:
        include:
          - service: assistant
            dockerfile: app
          - service: landing 
            dockerfile: landing
          - service: worker
            dockerfile: worker
      max-parallel: 3  # Build all 3 images in parallel
    
    permissions:
      contents: read
      packages: write
      actions: read
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set lowercase repository owner
      id: repo
      run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: |
          network=host
    
    - name: Build and push ${{ matrix.service }} image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: deployment/aws/docker/Dockerfile.${{ matrix.dockerfile }}
        platforms: linux/amd64
        push: true
        tags: |
          ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-${{ matrix.service }}:${{ env.IMAGE_TAG }}
          ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-${{ matrix.service }}:latest
        cache-from: |
          type=gha,scope=${{ matrix.service }}
          type=registry,ref=${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-${{ matrix.service }}:latest
        cache-to: type=gha,mode=max,scope=${{ matrix.service }}
        build-args: |
          BUILDKIT_INLINE_CACHE=1
    
    - name: Scan images for vulnerabilities (optional)
      if: github.event.inputs.force_deploy != 'true' && false  # Skip for faster deployments
      continue-on-error: true
      run: |
        # Install trivy
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy
        
        # Scan each image (non-blocking for deployment continuity)
        echo "Scanning rag-assistant image..."
        trivy image --exit-code 0 --severity HIGH,CRITICAL \
          ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-assistant:${{ env.IMAGE_TAG }} || echo "WARNING: Vulnerabilities found in rag-assistant"
        
        echo "Scanning rag-landing image..."
        trivy image --exit-code 0 --severity HIGH,CRITICAL \
          ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-landing:${{ env.IMAGE_TAG }} || echo "WARNING: Vulnerabilities found in rag-landing"
        
        echo "Scanning rag-worker image..."
        trivy image --exit-code 0 --severity HIGH,CRITICAL \
          ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-worker:${{ env.IMAGE_TAG }} || echo "WARNING: Vulnerabilities found in rag-worker"
        
        echo "SUCCESS: Vulnerability scans completed (non-blocking)"
    
    - name: Mirror ${{ matrix.service }} image to ECR for Lambda compatibility
      run: |
        echo "Setting up ECR repository and mirroring ${{ matrix.service }} image..."
        
        # Create ECR repository if it doesn't exist
        aws ecr describe-repositories --repository-names rag-${{ matrix.service }} --region ${{ env.AWS_REGION }} 2>/dev/null || \
        aws ecr create-repository --repository-name rag-${{ matrix.service }} --region ${{ env.AWS_REGION }} --image-scanning-configuration scanOnPush=false
        
        # Get ECR login token
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        
        # Mirror image to ECR
        echo "Mirroring rag-${{ matrix.service }} to ECR..."
        
        # Pull from GitHub Container Registry  
        docker pull ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-${{ matrix.service }}:${{ env.IMAGE_TAG }}
        
        # Tag for ECR
        docker tag ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-${{ matrix.service }}:${{ env.IMAGE_TAG }} \
          $ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/rag-${{ matrix.service }}:${{ env.IMAGE_TAG }}
        
        # Push to ECR
        docker push $ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/rag-${{ matrix.service }}:${{ env.IMAGE_TAG }}
        
        echo "Successfully mirrored rag-${{ matrix.service }} to ECR"

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: [validate-deployment, build-and-push]
    environment: ${{ needs.validate-deployment.outputs.environment }}
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Set lowercase repository owner
      id: repo
      run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: "1.6.0"
    
    - name: Deploy infrastructure with Terraform
      working-directory: infra/terraform
      run: |
        # Initialize Terraform
        terraform init \
          -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
          -backend-config="key=${{ needs.validate-deployment.outputs.environment }}/terraform.tfstate" \
          -backend-config="region=${{ env.AWS_REGION }}"
        
        # Validate Docker images exist before deployment
        echo "Verifying Docker images are available..."
        
        # Wait a moment for packages to be available after being made public
        echo "Waiting for package visibility changes to propagate..."
        sleep 30
        
        # Validate each image
        echo "Testing app image..."
        if docker manifest inspect ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-assistant:${{ env.IMAGE_TAG }}; then
          echo "SUCCESS: App image is accessible"
        else
          echo "ERROR: App image not found or not accessible"
          echo "Image URI: ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-assistant:${{ env.IMAGE_TAG }}"
          exit 1
        fi
        
        echo "Testing landing image..."
        if docker manifest inspect ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-landing:${{ env.IMAGE_TAG }}; then
          echo "SUCCESS: Landing image is accessible"
        else
          echo "ERROR: Landing image not found or not accessible"
          exit 1
        fi
        
        echo "Testing worker image..."
        if docker manifest inspect ${{ env.CONTAINER_REGISTRY }}/${{ steps.repo.outputs.owner }}/rag-worker:${{ env.IMAGE_TAG }}; then
          echo "SUCCESS: Worker image is accessible"
        else
          echo "ERROR: Worker image not found or not accessible"
          exit 1
        fi
        
        echo "SUCCESS: All Docker images verified and accessible"
        
        # Get AWS account ID for ECR URIs
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        
        # Plan deployment
        terraform plan \
          -var="environment=${{ needs.validate-deployment.outputs.environment }}" \
          -var="deployment_mode=${{ needs.validate-deployment.outputs.deployment-mode }}" \
          -var="image_tag=${{ env.IMAGE_TAG }}" \
          -var="app_image_uri=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/rag-assistant:${{ env.IMAGE_TAG }}" \
          -var="landing_image_uri=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/rag-landing:${{ env.IMAGE_TAG }}" \
          -var="worker_image_uri=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/rag-worker:${{ env.IMAGE_TAG }}" \
          -out=tfplan
        
        # Apply if not production or if this is a tagged release
        if [ "${{ needs.validate-deployment.outputs.environment }}" != "production" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          terraform apply -auto-approve tfplan
        else
          echo "Production deployment requires a version tag"
          exit 1
        fi
    
    - name: Get deployment outputs
      id: terraform-outputs
      working-directory: infra/terraform
      run: |
        echo "app-url=$(terraform output -raw app_url || echo 'pending')" >> $GITHUB_OUTPUT
        echo "landing-url=$(terraform output -raw landing_url || echo 'pending')" >> $GITHUB_OUTPUT
        echo "cluster-name=lambda-functions" >> $GITHUB_OUTPUT
    
    outputs:
      app-url: ${{ steps.terraform-outputs.outputs.app-url }}
      landing-url: ${{ steps.terraform-outputs.outputs.landing-url }}
      cluster-name: ${{ steps.terraform-outputs.outputs.cluster-name }}

  deploy-application:
    runs-on: ubuntu-latest
    needs: [validate-deployment, deploy-infrastructure]
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Install deployment dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3 botocore click tabulate
    
    - name: Wait for Lambda functions to be ready
      run: |
        echo "Waiting for Lambda functions to be ready..."
        sleep 30
    
    - name: Run basic validation
      run: |
        python scripts/deployment/production_validation.py \
          --health-check \
          --timeout 30 || echo "Validation completed with warnings"
    
    - name: Generate deployment report
      id: deployment-report
      run: |
        echo "deployment-summary<<EOF" >> $GITHUB_OUTPUT
        echo "**Deployment Successful**" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "- **Environment**: ${{ needs.validate-deployment.outputs.environment }}" >> $GITHUB_OUTPUT
        echo "- **Mode**: ${{ needs.validate-deployment.outputs.deployment-mode }}" >> $GITHUB_OUTPUT
        echo "- **Image Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT
        echo "- **App URL**: ${{ needs.deploy-infrastructure.outputs.app-url }}" >> $GITHUB_OUTPUT
        echo "- **Landing URL**: ${{ needs.deploy-infrastructure.outputs.landing-url }}" >> $GITHUB_OUTPUT
        echo "- **Cluster**: ${{ needs.deploy-infrastructure.outputs.cluster-name }}" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    outputs:
      deployment-summary: ${{ steps.deployment-report.outputs.deployment-summary }}

  post-deployment-tests:
    runs-on: ubuntu-latest
    needs: [deploy-application, deploy-infrastructure, validate-deployment]
    if: always() && needs.deploy-application.result == 'success'
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pytest
    
    - name: Run smoke tests against deployed app
      run: |
        APP_URL="${{ needs.deploy-infrastructure.outputs.app-url }}"
        
        if [ "$APP_URL" != "pending" ] && [ "$APP_URL" != "" ]; then
          echo "Testing deployment at: $APP_URL"
          
          # Health check using root endpoint (Gradio app)
          for attempt in {1..10}; do
            if curl -f -s --max-time 30 "$APP_URL" > /dev/null 2>&1; then
              echo "SUCCESS: Health check passed"
              break
            else
              echo "Attempt $attempt: Health check failed"
              if [ $attempt -eq 10 ]; then
                echo "ERROR: Health checks failed after all retries"
                echo "Trying alternative endpoint test..."
                # Check if Lambda is responding at all
                response_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$APP_URL" || echo "000")
                echo "Response code: $response_code"
                if [ "$response_code" -eq "200" ] || [ "$response_code" -eq "302" ]; then
                  echo "SUCCESS: Lambda is responding (code: $response_code)"
                  exit 0
                else
                  exit 1
                fi
              fi
              sleep 15  # Increased wait time for Lambda cold start
            fi
          done
        else
          echo "WARNING: App URL not available, skipping smoke tests"
        fi

  rollback-on-failure:
    runs-on: ubuntu-latest
    needs: [validate-deployment, deploy-application, post-deployment-tests]
    if: always() && (needs.deploy-application.result == 'failure' || needs.post-deployment-tests.result == 'failure')
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Install rollback dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3 click pyyaml requests
    
    - name: Execute rollback
      run: |
        python scripts/deployment/rollback_system.py \
          --strategy fast
    
    - name: Notify rollback completion
      run: |
        echo "Deployment rolled back due to failure"
        echo "- Environment: ${{ needs.validate-deployment.outputs.environment }}"
        echo "- Rollback strategy: fast"

  notify-deployment:
    runs-on: ubuntu-latest
    needs: [validate-deployment, deploy-application, post-deployment-tests]  # Remove cost-estimation
    if: always()
    
    steps:
    - name: Determine notification status
      id: status
      run: |
        if [ "${{ needs.post-deployment-tests.result }}" = "success" ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "message=Deployment successful!" >> $GITHUB_OUTPUT
        elif [ "${{ needs.deploy-application.result }}" = "failure" ] || [ "${{ needs.post-deployment-tests.result }}" = "failure" ]; then
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "message=Deployment failed and was rolled back" >> $GITHUB_OUTPUT
        else
          echo "status=warning" >> $GITHUB_OUTPUT
          echo "message=Deployment completed with warnings" >> $GITHUB_OUTPUT
        fi
    
    - name: Create deployment notification
      uses: actions/github-script@v8
      with:
        script: |
          const status = '${{ steps.status.outputs.status }}';
          const message = '${{ steps.status.outputs.message }}';
          const deploymentSummary = `${{ needs.deploy-application.outputs.deployment-summary || 'Deployment summary not available' }}`;
          const costReport = 'Cost estimation skipped for faster deployments';
          
          const body = `${message}
          
          ## Deployment Details
          ${deploymentSummary}
          
          ## Estimated Costs
          \`\`\`json
          ${costReport}
          \`\`\`
          
          ## Workflow Run
          [View full deployment logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          `;
          
          // Create issue or comment based on event type
          if (context.eventName === 'pull_request') {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          } else if (status === 'failure') {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ALERT: Deployment Failure - ${new Date().toISOString().slice(0, 10)}`,
              body: body,
              labels: ['deployment', 'urgent']
            });
          }
