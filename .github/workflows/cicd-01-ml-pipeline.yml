name: ML Pipeline - Model Training & Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'rag_pipeline/**'
      - 'llm_ollama/**'
      - 'requirements.txt'
      - 'pyproject.toml'
  pull_request:
    branches: [ main ]
    paths:
      - 'rag_pipeline/**'
      - 'llm_ollama/**'
      - 'requirements.txt'
      - 'pyproject.toml'

env:
  PYTHON_VERSION: '3.11'
  OLLAMA_HOST: 'http://localhost:11434'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black isort flake8 mypy
    
    - name: Format check with Black
      run: black --check --diff .
      
    - name: Import sorting with isort
      run: isort --check-only --diff .
      
    - name: Lint with flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
    - name: Type checking with mypy
      run: mypy rag_pipeline/ llm_ollama/ --ignore-missing-imports || true

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    services:
      opensearch:
        image: opensearchproject/opensearch:2.11.0
        env:
          discovery.type: single-node
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: TestPassword123!
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 9200:9200
          
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock
    
    - name: Set up Ollama service
      run: |
        curl -fsSL https://ollama.ai/install.sh | sh
        ollama serve &
        sleep 10
        ollama pull llama3.2:1b
        
    - name: Configure test environment
      run: |
        cp configs/secrets.template.env .env
        echo "OPENSEARCH_HOST=localhost" >> .env
        echo "OPENSEARCH_PORT=9200" >> .env
        echo "OPENSEARCH_USER=admin" >> .env
        echo "OPENSEARCH_PASSWORD=TestPassword123!" >> .env
        echo "OLLAMA_HOST=http://localhost:11434" >> .env
    
    - name: Run unit tests
      run: |
        pytest tests/ \
          --cov=rag_pipeline \
          --cov=llm_ollama \
          --cov-report=xml \
          --cov-report=term-missing \
          -v
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
    
    services:
      opensearch:
        image: opensearchproject/opensearch:2.11.0
        env:
          discovery.type: single-node
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: TestPassword123!
        ports:
          - 9200:9200
          
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Set up Ollama
      run: |
        curl -fsSL https://ollama.ai/install.sh | sh
        ollama serve &
        sleep 10
        ollama pull llama3.2:1b
    
    - name: Configure environment
      run: |
        cp configs/secrets.template.env .env
        echo "OPENSEARCH_HOST=localhost" >> .env
        echo "OPENSEARCH_PORT=9200" >> .env
        echo "OPENSEARCH_USER=admin" >> .env
        echo "OPENSEARCH_PASSWORD=TestPassword123!" >> .env
        echo "OLLAMA_HOST=http://localhost:11434" >> .env
    
    - name: Initialize OpenSearch
      run: |
        python scripts/bootstrap_opensearch.sh
        
    - name: Run integration tests
      run: |
        python scripts/smoke_test.py
        
    - name: Test RAG pipeline end-to-end
      run: |
        python -c "
        import sys
        sys.path.append('.')
        from rag_pipeline.ingestion.pipeline import DocumentIngestionPipeline
        from rag_pipeline.retrieval.retriever import HybridRetriever
        
        # Test document ingestion
        pipeline = DocumentIngestionPipeline('./data/samples/')
        result = pipeline.process_directory()
        print(f'Ingestion test: {len(result)} documents processed')
        
        # Test retrieval
        retriever = HybridRetriever()
        results = retriever.retrieve('test query', k=3)
        print(f'Retrieval test: {len(results)} documents retrieved')
        "

  performance-benchmark:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-benchmark
    
    - name: Run performance benchmarks
      run: |
        python scripts/eval_retrieval.py --mode benchmark
        
    - name: Store benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: RAG Pipeline Performance
        tool: 'pytest'
        output-file-path: benchmark-results.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        comment-on-alert: true
        alert-threshold: '200%'